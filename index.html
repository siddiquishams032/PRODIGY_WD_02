<!DOCTYPE html>
<html lang="en">
<head>

  <title>Responsive Navbar</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <section id="about" class="s2">About</section>
  <section id="services" class="s3">Services</section>

  <!-- JS LINK -->
  <script src="script.js"></script>

</body>
</html>
